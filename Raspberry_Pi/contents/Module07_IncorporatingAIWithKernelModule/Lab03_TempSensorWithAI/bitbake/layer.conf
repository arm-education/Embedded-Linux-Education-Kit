# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "llama"
BBFILE_PATTERN_llama = "^${LAYERDIR}/"
BBFILE_PRIORITY_llama = "5"
LAYERVERSION_llama = "4"
LAYERSERIES_COMPAT_llama = "scarthgap"